id: lit
cadence: { mode: self-paced, every: 1d }
observe:
  target: "OpenAlex works matching the query"
  how: openalex
  inputs:
    query: "RSV prefusion F antigen"
    # Each run re-queries from this static from_date and relies on the engine's
    # seen_keys dedup to surface only new papers — correct, but it re-fetches a
    # growing window over time (incremental cursoring is roadmap item #6).
    from_date: "2026-01-01"
    mailto: "you@example.com"
flag:
  fields: [type, severity, item, why_it_matters, suggested_action]
  dedup_key: "OpenAlex work id (or DOI)"
stop:
  pause_for_human_when: { severity_at_least: critical }
  exit_when: { empty_iterations: 5 }
  max_iterations: 100
